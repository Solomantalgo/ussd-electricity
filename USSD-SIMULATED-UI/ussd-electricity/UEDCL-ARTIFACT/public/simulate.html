<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USSD Simulator</title>
    <style>
        /* Main background setup to center the phone on screen */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The outer phone container with border and shadows */
        #phone {
            width: 320px;
            height: 640px;
            background: #000;
            border-radius: 40px;
            border: 12px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Top status bar (clock, battery, signal) */
        #phone-status-bar {
            height: 40px;
            background: #000;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
        }

        /* Dark overlay behind the USSD dialog */
        #ussd-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* The white USSD popup card */
        #ussd-dialog {
            width: 85%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Area where USSD text from server is displayed */
        #screen {
            color: #000;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.4;
        }

        /* Hidden input field that stores the keypad numbers */
        #reply {
            width: 100%;
            padding: 10px 0;
            box-sizing: border-box;
            border: none;
            border-bottom: 2px solid #007bff;
            margin-bottom: 15px;
            outline: none;
            font-size: 18px;
            text-align: center;
            background: transparent;
        }

        /* Cancel and Send button layout */
        .buttons {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        /* Styling for the dialog action buttons */
        .action-btn {
            background: none;
            border: none;
            color: #007bff;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Keypad grid layout */
        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 80%;
            margin-top: 20px;
        }

        /* Individual circular key styling */
        .key {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Visual feedback when a key is pressed */
        .key:active {
            background: rgba(255,255,255,0.3);
        }

        /* Smaller letters under the numbers on the keys */
        .key span {
            font-size: 10px;
            display: block;
            margin-top: -5px;
            opacity: 0.6;
        }

        .key-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="phone">
        <!-- Status bar at the very top -->
        <div id="phone-status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <div id="ussd-overlay">
            <!-- The USSD Message Box -->
            <div id="ussd-dialog">
                <div id="screen">Welcome to UEDCL!
Dial *165# to begin</div>
                <!-- Input field (Readonly so users use the keypad) -->
                <input type="text" id="reply" placeholder="" readonly>
                <div class="buttons">
                    <button class="action-btn" onclick="reset()">Cancel</button>
                    <button class="action-btn" id="send-btn" onclick="send()">Send</button>
                </div>
            </div>

            <!-- The Dialing Keypad -->
            <div id="keypad">
                <button class="key" onclick="press('1')"><div class="key-content">1<span>&nbsp;</span></div></button>
                <button class="key" onclick="press('2')"><div class="key-content">2<span>ABC</span></div></button>
                <button class="key" onclick="press('3')"><div class="key-content">3<span>DEF</span></div></button>
                <button class="key" onclick="press('4')"><div class="key-content">4<span>GHI</span></div></button>
                <button class="key" onclick="press('5')"><div class="key-content">5<span>JKL</span></div></button>
                <button class="key" onclick="press('6')"><div class="key-content">6<span>MNO</span></div></button>
                <button class="key" onclick="press('7')"><div class="key-content">7<span>PQRS</span></div></button>
                <button class="key" onclick="press('8')"><div class="key-content">8<span>TUV</span></div></button>
                <button class="key" onclick="press('9')"><div class="key-content">9<span>WXYZ</span></div></button>
                <button class="key" onclick="press('*')"><div class="key-content">*<span>&nbsp;</span></div></button>
                <button class="key" onclick="press('0')"><div class="key-content">0<span>+</span></div></button>
                <button class="key" onclick="press('#')"><div class="key-content">#<span>&nbsp;</span></div></button>
                <button class="key" onclick="backspace()" style="background:none; grid-column: 2;"><div class="key-content">⌫</div></button>
            </div>
        </div>
    </div>

    <script>
        // currentText keeps track of the accumulated USSD string (e.g., "1*123456")
        let currentText = "";
        let phoneNumber = "256770000000";
        // Unique session ID for each simulation
        let sessionId = "sim_" + Math.random().toString(36).substr(2, 9);

        const screen = document.getElementById("screen");
        const replyInput = document.getElementById("reply");
        const sendBtn = document.getElementById("send-btn");

        // Adds number/character from keypad to the input field
        function press(val) {
            replyInput.value += val;
        }

        // Deletes the last character in the input field
        function backspace() {
            replyInput.value = replyInput.value.slice(0, -1);
        }

        // Main function to send the USSD request to the server
        async function send() {
            const userInput = replyInput.value.trim();

            if (userInput === "" && currentText === "") return;

            // Handle initial dial logic (*165#)
            if (currentText === "" && userInput === "*165#") {
                currentText = ""; // Server expects empty text string for first dial
            } else if (currentText === "") {
                currentText = userInput;
            } else {
                // Append the latest user choice to the path (USSD standard)
                currentText += "*" + userInput;
            }

            // Package data into URL-encoded format for the server
            const formData = new URLSearchParams();
            formData.append("sessionId", sessionId);
            formData.append("serviceCode", "*165#");
            formData.append("phoneNumber", phoneNumber);
            formData.append("text", currentText);

            try {
                // Perform the POST request to /ussd
                const response = await fetch("/ussd", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: formData
                });

                let data = await response.text();

                // If response starts with CON, the session continues
                if (data.startsWith("CON ")) {
                    screen.innerHTML = data.substring(4);
                }
                // If response starts with END, the session is over
                else if (data.startsWith("END ")) {
                    screen.innerHTML = data.substring(4);
                    replyInput.style.visibility = "hidden"; // Hide input
                    document.getElementById("keypad").style.display = "none"; // Hide keypad
                    sendBtn.innerHTML = "Exit"; // Change Send to Exit
                    sendBtn.onclick = reset;
                } else {
                    screen.innerHTML = data;
                }

                // Clear input for next step
                replyInput.value = "";
            } catch (error) {
                console.error("Error:", error);
                screen.innerHTML = "Connection Error. Make sure server is running.";
            }
        }

        // Resets the simulator to the starting state
        function reset() {
            currentText = "";
            sessionId = "sim_" + Math.random().toString(36).substr(2, 9);
            screen.innerHTML = "Welcome to UEDCL!\nDial *165# to begin";
            replyInput.value = "";
            replyInput.style.visibility = "visible";
            document.getElementById("keypad").style.display = "grid";
            sendBtn.innerHTML = "Send";
            sendBtn.onclick = send;
        }
    </script>
</body>
</html>
